exclude: |
    (?x)(
        ^docs/|
        ^notebooks/
    )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-json
      - id: check-yaml
        args: ['--allow-multiple-documents']
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.7.4
    hooks:
    # Run the linter.
      - id: ruff
        args: [ --fix ]
        # Run the formatter.
      - id: ruff-format
